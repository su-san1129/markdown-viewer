name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: "<*_&"

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
      - "major"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
      - "feat"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
      - "bugfix"
      - "hotfix"
  - title: "Performance"
    labels:
      - "perf"
  - title: "Refactors"
    labels:
      - "refactor"
  - title: "Documentation"
    labels:
      - "docs"
  - title: "Maintenance"
    labels:
      - "chore"
      - "build"
      - "ci"
      - "deps"

exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "invalid"
  - "wontfix"

version-resolver:
  major:
    labels:
      - "breaking"
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
      - "feat"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "bugfix"
      - "hotfix"
      - "perf"
      - "refactor"
      - "docs"
      - "chore"
      - "build"
      - "ci"
      - "deps"
  default: patch

template: |
  ## What is in this release

  $CHANGES

  ## Download

  - Download page: https://su-san1129.github.io/view-bomber/
  - Release assets: see this release's **Assets** section

  ## Notes

  - Version: $RESOLVED_VERSION

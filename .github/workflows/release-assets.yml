name: Release Assets

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    if: github.event_name == 'workflow_dispatch' || github.event.release.draft == true
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest
          - name: Linux
            runner: ubuntu-22.04
    runs-on: ${{ matrix.platform.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build installers
        run: bun run tauri build

      - name: Collect installer files
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/target/release/bundle -type f \
            \( -name '*.dmg' -o -name '*.pkg' -o -name '*.msi' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            > /tmp/release-assets.txt

          if [ ! -s /tmp/release-assets.txt ]; then
            echo "No installer assets found."
            exit 1
          fi

          echo "Uploading files:"
          cat /tmp/release-assets.txt

      - name: Upload to release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t files < /tmp/release-assets.txt
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

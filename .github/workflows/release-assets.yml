name: Release Assets

on:
  workflow_run:
    workflows: ["Release Drafter"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (example: v0.1.0)"
        required: true
        type: string
      run_id:
        description: "Optional Build Installers run id to pull artifacts from"
        required: false
        type: string

permissions:
  actions: read
  contents: write

jobs:
  upload:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases" \
              --jq 'map(select(.draft == true)) | sort_by(.created_at) | last | .tag_name')
          fi

          if [ -z "${TAG:-}" ] || [ "$TAG" = "null" ]; then
            echo "No target draft release tag found."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Resolve Build Installers run id
        id: run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_RUN_ID:-}" ]; then
            RUN_ID="$INPUT_RUN_ID"
          elif [ -n "${WORKFLOW_SHA:-}" ]; then
            RUN_ID=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/installers.yml/runs?head_sha=${WORKFLOW_SHA}&status=completed&per_page=20" \
              --jq '.workflow_runs | map(select(.conclusion == "success")) | first | .id')
          else
            RUN_ID=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/installers.yml/runs?branch=main&status=completed&per_page=20" \
              --jq '.workflow_runs | map(select(.conclusion == "success")) | first | .id')
          fi

          if [ -z "${RUN_ID:-}" ] || [ "$RUN_ID" = "null" ]; then
            echo "Could not find a successful Build Installers run id."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Using installers run id: $RUN_ID"

      - name: Download installer artifacts from Build Installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/installers
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir /tmp/installers

      - name: Prepare canonical installer files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release-upload

          pick_one() {
            local root="$1"
            shift
            for ext in "$@"; do
              local found
              found=$(find "$root" -type f -iname "*.${ext}" | head -n 1 || true)
              if [ -n "$found" ]; then
                echo "$found"
                return 0
              fi
            done
            return 1
          }

          mac_arm64_file=$(pick_one /tmp/installers/installers-macOS-arm64 dmg pkg) || {
            echo "macOS arm64 installer not found."
            exit 1
          }
          mac_x64_file=$(pick_one /tmp/installers/installers-macOS-x64 dmg pkg) || {
            echo "macOS x64 installer not found."
            exit 1
          }
          windows_file=$(pick_one /tmp/installers/installers-Windows msi exe) || {
            echo "Windows installer not found."
            exit 1
          }
          linux_file=$(pick_one /tmp/installers/installers-Linux AppImage deb rpm) || {
            echo "Linux installer not found."
            exit 1
          }

          cp "$mac_arm64_file" /tmp/release-upload/view-bomber-macos-arm64.${mac_arm64_file##*.}
          cp "$mac_x64_file" /tmp/release-upload/view-bomber-macos-x64.${mac_x64_file##*.}
          cp "$windows_file" /tmp/release-upload/view-bomber-windows.${windows_file##*.}
          cp "$linux_file" /tmp/release-upload/view-bomber-linux.${linux_file##*.}

          find /tmp/release-upload -type f > /tmp/release-assets.txt
          echo "Will upload canonical files:"
          cat /tmp/release-assets.txt

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd /tmp/release-upload
          sha256sum * > checksums-sha256.txt
          echo "/tmp/release-upload/checksums-sha256.txt" >> /tmp/release-assets.txt

      - name: Upload artifacts to release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t files < /tmp/release-assets.txt
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
